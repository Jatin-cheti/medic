<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:300,400,600,700">
  <title>Medic - Doctor Login</title>
</head>
<body>
  <app-loader [show]="isLoading" text="Signing you in..."></app-loader>
  <div class="background">
    <div class="login-wrapper">
      <div class="left-section">
        <div class="header">
          <img class="logo" src="logo.svg" alt="Medic Logo">
          <h1 class="title">Medic</h1>
        </div>
        <div class="welcome-content">
          <h2>Welcome Back, Doctor</h2>
          <p>Manage your patients and appointments with ease</p>
          <div class="features">
            <div class="feature">
              <span class="icon">✓</span>
              <span>Patient Management</span>
            </div>
            <div class="feature">
              <span class="icon">✓</span>
              <span>Appointment Scheduling</span>
            </div>
            <div class="feature">
              <span class="icon">✓</span>
              <span>Medical Records Access</span>
            </div>
          </div>
        </div>
      </div>

      <div class="right-section">
        <div class="login-container">
          <h3 class="login-title">Doctor Login</h3>
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
              <label for="identifier">Email or Phone</label>
              <div class="input-wrapper">
                <span class="input-icon">✉</span>
                <input type="text" id="identifier" formControlName="identifier" placeholder="your@medic.com or +91..." required>
              </div>
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <div class="input-wrapper">
                <span class="input-icon">🔒</span>
                <input type="password" id="password" formControlName="password" placeholder="Enter your password" required>
              </div>
            </div>

            <app-error-banner [message]="errorMessage" (dismissed)="clearError()"></app-error-banner>

            <div class="form-options">
              <label class="remember-me">
                <input type="checkbox">
                <span>Remember me</span>
              </label>
              <a href="#" class="forgot-password">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn" [disabled]="isLoading || loginForm.invalid">Sign In</button>
          </form>

          <div class="divider">OR</div>

          <button class="social-btn google-btn">
            <span>Continue with Google</span>
          </button>

          <p class="signup-link">Don't have an account? <a routerLink="/doctor-signup">Register as Doctor</a></p>
          <div class="patient-login-link">
            <a routerLink="/patient-login" class="login-as-patient">Login as Patient</a>
          </div>
          <div class="patient-login-link">
            <a routerLink="/patient-signup" class="login-as-patient">Register as Patient</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
