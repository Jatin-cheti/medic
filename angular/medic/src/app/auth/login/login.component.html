<div class="login-container">
  <div class="login-card">
    <h1 class="header">Welcome Back!</h1>
    <p class="subtext">Please log in to continue to your account</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          class="form-control"
          formControlName="email"
          placeholder="Enter your email"
          [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        />
        <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="invalid-feedback">
          Please enter a valid email address.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          class="form-control"
          formControlName="password"
          placeholder="Enter your password"
          [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        />
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="invalid-feedback">
          Password must be at least 6 characters long.
        </div>
      </div>

      <div class="form-group">
        <label for="role">Role</label>
        <select
          id="role"
          class="form-select"
          formControlName="role"
          [class.is-invalid]="loginForm.get('role')?.invalid && loginForm.get('role')?.touched"
        >
          <option value="" disabled>Select your role</option>
          <option value="Patient">Patient</option>
          <option value="Doctor">Doctor</option>
          <option value="Admin">Admin</option>
          <option value="SuperAdmin">Super Admin</option>
        </select>
        <div *ngIf="loginForm.get('role')?.invalid && loginForm.get('role')?.touched" class="invalid-feedback">
          Please select a role.
        </div>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger mt-3">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="isLoading || loginForm.invalid">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        <span *ngIf="!isLoading">Log In</span>
      </button>
    </form>

    <div class="mt-3">
      <a routerLink="/forgot-password" class="text-secondary">Forgot Password?</a>
    </div>
  </div>
</div>
