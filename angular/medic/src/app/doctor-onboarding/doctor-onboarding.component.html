<div class="container mt-5" [@fadeInAnimation]>
  <h2 class="text-primary">Doctor Onboarding</h2>
  <form [formGroup]="onboardingForm" (ngSubmit)="submit()">
    <div class="row mb-3">
      <div class="col-md-6">
        <label for="name" class="form-label">Name</label>
        <input type="text" id="name" formControlName="name" class="form-control" aria-label="Doctor's name">
      </div>
      <div class="col-md-6">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" formControlName="email" class="form-control" aria-label="Doctor's email">
      </div>
    </div>
    <div class="row mb-3">
      <div class="col-md-6">
        <label for="phone" class="form-label">Phone Number</label>
        <input type="text" id="phone" formControlName="phone" class="form-control" aria-label="Doctor's phone number">
      </div>
    </div>
    <div class="row mb-3">
      <div class="col-md-6">
        <label for="experienceCertificate" class="form-label">Experience Certificate</label>
        <input type="file" id="experienceCertificate" (change)="onFileChange($event, 'experienceCertificate')" class="form-control" aria-label="Upload experience certificate">
      </div>
      <div class="col-md-6">
        <label for="degree" class="form-label">Degree</label>
        <input type="file" id="degree" (change)="onFileChange($event, 'degree')" class="form-control" aria-label="Upload degree">
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Submit</button>
    <div class="mt-3">
      <p>Status: {{ uploadStatus }}</p>
      <p *ngIf="notification" class="text-success">{{ notification }}</p>
    </div>
  </form>
</div>
