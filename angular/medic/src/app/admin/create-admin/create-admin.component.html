<div class="create-admin-page">
  <div class="form-card">
    <h1>Create New Admin</h1>
    <p class="subtitle">New admin accounts can access the admin dashboard and verify doctor documents.</p>

    <div *ngIf="successMessage" class="alert alert-success">✓ {{ successMessage }}</div>
    <div *ngIf="errorMessage" class="alert alert-error">⚠ {{ errorMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name <span class="required">*</span></label>
          <input
            id="firstName"
            type="text"
            formControlName="firstName"
            placeholder="First name"
            [class.invalid]="form.get('firstName')?.invalid && form.get('firstName')?.touched"
          />
          <span class="field-error" *ngIf="form.get('firstName')?.invalid && form.get('firstName')?.touched">
            First name is required.
          </span>
        </div>

        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input
            id="lastName"
            type="text"
            formControlName="lastName"
            placeholder="Last name (optional)"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address <span class="required">*</span></label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="admin@example.com"
          [class.invalid]="form.get('email')?.invalid && form.get('email')?.touched"
        />
        <span class="field-error" *ngIf="form.get('email')?.errors?.['required'] && form.get('email')?.touched">
          Email is required.
        </span>
        <span class="field-error" *ngIf="form.get('email')?.errors?.['email'] && form.get('email')?.touched">
          Please enter a valid email.
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password <span class="required">*</span></label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Minimum 8 characters"
          [class.invalid]="form.get('password')?.invalid && form.get('password')?.touched"
        />
        <span class="field-error" *ngIf="form.get('password')?.errors?.['required'] && form.get('password')?.touched">
          Password is required.
        </span>
        <span class="field-error" *ngIf="form.get('password')?.errors?.['minlength'] && form.get('password')?.touched">
          Password must be at least 8 characters.
        </span>
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="isLoading || form.invalid">
        <span *ngIf="!isLoading">Create Admin</span>
        <span *ngIf="isLoading">Creating…</span>
      </button>
    </form>
  </div>
</div>
