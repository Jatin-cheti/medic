<div class="admin-shell" [class.sidebar-collapsed]="!isSidebarOpen">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="logo.svg" alt="Medic" class="sidebar-logo">
      <span class="sidebar-brand">Medic Admin</span>
      <button class="sidebar-toggle" (click)="toggleSidebar()">☰</button>
    </div>

    <div class="user-badge">
      <div class="avatar">{{ initials }}</div>
      <div class="user-info">
        <div class="user-name">{{ userName }}</div>
        <div class="user-role" [class.super]="isSuperAdmin">
          {{ isSuperAdmin ? 'Super Admin' : 'Admin' }}
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a [routerLink]="basePath + '/dashboard'" routerLinkActive="active" class="nav-item" title="Dashboard">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
        </span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a [routerLink]="basePath + '/doctors'" routerLinkActive="active" class="nav-item" title="Doctors">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/>
            <line x1="16" y1="11" x2="22" y2="11"/>
          </svg>
        </span>
        <span class="nav-label">Doctors</span>
      </a>
      <a [routerLink]="basePath + '/patients'" routerLinkActive="active" class="nav-item" title="Patients">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87"/>
            <path d="M16 3.13a4 4 0 010 7.75"/>
          </svg>
        </span>
        <span class="nav-label">Patients</span>
      </a>
      <a [routerLink]="basePath + '/documents'" routerLinkActive="active" class="nav-item" title="Document Verification">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <line x1="10" y1="9" x2="8" y2="9"/>
          </svg>
        </span>
        <span class="nav-label">Document Verification</span>
      </a>
      <a *ngIf="isSuperAdmin" [routerLink]="basePath + '/create-admin'" routerLinkActive="active" class="nav-item" title="Create Admin">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="20" y1="8" x2="20" y2="14"/>
            <line x1="23" y1="11" x2="17" y2="11"/>
          </svg>
        </span>
        <span class="nav-label">Create Admin</span>
      </a>
      <a [routerLink]="basePath + '/symptom-checker'" routerLinkActive="active" class="nav-item" title="Symptom Checker">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/>
          </svg>
        </span>
        <span class="nav-label">Symptom Checker</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16,17 21,12 16,7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </span>
        <span class="nav-label">Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    <header class="topbar">
      <button class="topbar-toggle" (click)="toggleSidebar()">☰</button>
      <div class="topbar-title">
        {{ isSuperAdmin ? 'Super Admin Portal' : 'Admin Portal' }}
      </div>
    </header>
    <div class="page-body">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
