<div class="admin-shell" [class.sidebar-collapsed]="!isSidebarOpen">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="logo.svg" alt="Medic" class="sidebar-logo">
      <span class="sidebar-brand">Medic Admin</span>
      <button class="sidebar-toggle" (click)="toggleSidebar()">☰</button>
    </div>

    <div class="user-badge">
      <div class="avatar">{{ initials }}</div>
      <div class="user-info">
        <div class="user-name">{{ userName }}</div>
        <div class="user-role" [class.super]="isSuperAdmin">
          {{ isSuperAdmin ? 'Super Admin' : 'Admin' }}
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a [routerLink]="basePath + '/dashboard'" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a [routerLink]="basePath + '/doctors'" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">👨‍⚕️</span>
        <span class="nav-label">Doctors</span>
      </a>
      <a [routerLink]="basePath + '/patients'" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🏥</span>
        <span class="nav-label">Patients</span>
      </a>
      <a [routerLink]="basePath + '/documents'" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📄</span>
        <span class="nav-label">Document Verification</span>
      </a>
      <a *ngIf="isSuperAdmin" [routerLink]="basePath + '/create-admin'" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">➕</span>
        <span class="nav-label">Create Admin</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <span class="nav-icon">🚪</span>
        <span class="nav-label">Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    <header class="topbar">
      <button class="topbar-toggle" (click)="toggleSidebar()">☰</button>
      <div class="topbar-title">
        {{ isSuperAdmin ? 'Super Admin Portal' : 'Admin Portal' }}
      </div>
    </header>
    <div class="page-body">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
