<div class="container mt-4">
  <h1 class="text-primary">Admin Dashboard</h1>
  <form [formGroup]="filterForm" (ngSubmit)="onFilter()" class="mb-4">
    <div class="input-group">
      <select formControlName="role" class="form-select" aria-label="Select user role">
        <option value="" disabled selected>Select Role</option>
        <option value="doctor">Doctors</option>
        <option value="patient">Patients</option>
        <option value="admin">Admins</option>
      </select>
      <button type="submit" class="btn btn-primary">Filter</button>
    </div>
  </form>
  
  <div class="row">
    <div class="col-md-4" *ngFor="let user of users$ | async">
      <div class="card mb-3 fade-in">
        <div class="card-body">
          <h5 class="card-title">{{ user.name }}</h5>
          <p class="card-text">Role: {{ user.role }}</p>
          <p class="card-text">Status: {{ user.status }}</p>
          <button class="btn btn-secondary">Verify Documents</button>
        </div>
      </div>
    </div>
  </div>
</div>
