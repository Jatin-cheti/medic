<div class="container mt-4" [@fadeInAnimation]>
  <h2 class="text-primary">Document Verification</h2>
  <div class="row">
    <div class="col-md-12">
      <div class="card">
        <div class="card-body">
          <div class="row">
            <div class="col-md-12">
              <h5 class="mb-3">Uploaded Documents</h5>
              <div class="row">
                <ng-container *ngFor="let document of documents$ | async">
                  <div class="col-sm-12 col-md-6 col-lg-4 mb-3">
                    <div class="card">
                      <div class="card-body">
                        <h6>{{ document.type }}</h6>
                        <p>Uploaded by: {{ document.doctorName }}</p>
                        <p>Status: <span [ngClass]="{'text-success': document.status === 'approved', 'text-danger': document.status === 'rejected'}">{{ document.status }}</span></p>
                        <button class="btn btn-success" (click)="onApprove(document.id)">Approve</button>
                        <button class="btn btn-danger" (click)="onReject(document.id)">Reject</button>
                        <button class="btn btn-warning" (click)="onRequestChanges(document.id)">Request Changes</button>
                      </div>
                    </div>
                  </div>
                </ng-container>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
