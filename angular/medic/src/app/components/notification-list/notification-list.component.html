<div class="container mt-4">
  <h2 class="text-primary">Notifications</h2>
  <div class="row">
    <div class="col-12" *ngFor="let notification of notifications" [@fadeInAnimation]>
      <div class="card mb-3">
        <div class="card-body">
          <h5 class="card-title">{{ notification.type }}</h5>
          <p class="card-text">{{ notification.message }}</p>
          <p class="card-text"><small class="text-muted">{{ notification.timestamp | date:'short' }}</small></p>
        </div>
      </div>
    </div>
  </div>
</div>
