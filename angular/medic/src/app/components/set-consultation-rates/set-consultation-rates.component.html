<div class="container mt-4" [@fadeInAnimation]>
  <h2 class="text-primary">Set Consultation Rates</h2>
  <form [formGroup]="consultationRateForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label for="rate" class="form-label">Consultation Rate</label>
      <input type="number" id="rate" class="form-control" formControlName="rate" placeholder="Enter rate" />
      <div *ngIf="consultationRateForm.get('rate')?.invalid && consultationRateForm.get('rate')?.touched" class="text-danger">
        Rate is required and must be a positive number.
      </div>
    </div>
    <div class="mb-3">
      <label for="consultationType" class="form-label">Consultation Type</label>
      <select id="consultationType" class="form-select" formControlName="consultationType">
        <option value="" disabled selected>Select type</option>
        <option value="Video">Video</option>
        <option value="Audio">Audio</option>
        <option value="Physical">Physical</option>
      </select>
      <div *ngIf="consultationRateForm.get('consultationType')?.invalid && consultationRateForm.get('consultationType')?.touched" class="text-danger">
        Consultation type is required.
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <button type="button" class="btn btn-secondary" (click)="consultationRateForm.reset()">Cancel</button>
  </form>
  <div *ngIf="successMessage" class="alert alert-success mt-3">{{ successMessage }}</div>
  <div *ngIf="errorMessage" class="alert alert-danger mt-3">{{ errorMessage }}</div>
</div>
