<div class="modal-header">
  <h5 class="modal-title">Book Appointment with {{ doctor.name }}</h5>
  <button type="button" class="close" aria-label="Close" (click)="activeModal.dismiss()">
    <span aria-hidden="true">&times;</span>
  </button>
</div>
<div class="modal-body">
  <form [formGroup]="appointmentForm" (ngSubmit)="bookAppointment()">
    <div class="form-group">
      <label for="appointmentType">Appointment Type</label>
      <select id="appointmentType" formControlName="appointmentType" class="form-control">
        <option value="" disabled selected>Select Type</option>
        <option value="video">Video Call</option>
        <option value="audio">Audio Call</option>
        <option value="physical">Physical Appointment</option>
      </select>
      <div *ngIf="appointmentForm.get('appointmentType')?.invalid && appointmentForm.get('appointmentType')?.touched" class="text-danger">
        Appointment type is required.
      </div>
    </div>
    <div class="form-group">
      <label for="appointmentDate">Appointment Date</label>
      <input type="date" id="appointmentDate" formControlName="appointmentDate" class="form-control" />
      <div *ngIf="appointmentForm.get('appointmentDate')?.invalid && appointmentForm.get('appointmentDate')?.touched" class="text-danger">
        Appointment date is required.
      </div>
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="appointmentForm.invalid">Book Appointment</button>
  </form>
</div>
