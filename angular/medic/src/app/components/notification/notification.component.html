<div class="container mt-4">
  <h2 class="text-primary">Document Status Notifications</h2>
  <div class="row">
    <div class="col-12 col-md-6 col-lg-4" *ngFor="let notification of notifications" [@fadeInAnimation]>
      <div class="card mb-3">
        <div class="card-body">
          <h5 class="card-title">{{ notification.title }}</h5>
          <p class="card-text">{{ notification.message }}</p>
          <p class="text-muted">{{ notification.timestamp }}</p>
          <span class="badge" [ngClass]="{
            'bg-warning': notification.status === 'Pending',
            'bg-success': notification.status === 'Approved',
            'bg-danger': notification.status === 'Rejected'
          }">{{ notification.status }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
