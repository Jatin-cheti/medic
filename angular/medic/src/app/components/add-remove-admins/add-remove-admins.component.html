<div class="container mt-4" [@fadeInAnimation]>
  <h2 class="text-primary">Manage Admins</h2>
  <form [formGroup]="adminForm" (ngSubmit)="addAdmin()">
    <div class="mb-3">
      <label for="name" class="form-label">Admin Name</label>
      <input type="text" id="name" formControlName="name" class="form-control" required>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Admin Email</label>
      <input type="email" id="email" formControlName="email" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Add Admin</button>
  </form>

  <div class="row mt-4">
    <div class="col-md-4" *ngFor="let admin of admins">
      <div class="card mb-3">
        <div class="card-body">
          <h5 class="card-title">{{ admin.name }}</h5>
          <p class="card-text">{{ admin.email }}</p>
          <button class="btn btn-danger" (click)="openModal(admin.id)">Remove Admin</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" tabindex="-1" [ngClass]="{'show': showModal}" style="display: {{ showModal ? 'block' : 'none' }}">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Confirm Removal</h5>
          <button type="button" class="btn-close" (click)="closeModal()"></button>
        </div>
        <div class="modal-body">
          <p>Are you sure you want to remove this admin?</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancel</button>
          <button type="button" class="btn btn-danger" (click)="removeAdmin()">Remove</button>
        </div>
      </div>
    </div>
  </div>
</div>
