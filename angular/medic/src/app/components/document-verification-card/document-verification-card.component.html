<div class="card mb-3 fade-in">
  <div class="card-header">
    <h5>{{ document.doctorName }} - {{ document.status }}</h5>
  </div>
  <div class="card-body">
    <p><strong>Document Type:</strong> {{ document.type }}</p>
    <p><strong>Upload Date:</strong> {{ document.uploadedDate | date }}</p>
    <button class="btn btn-primary" (click)="approveDocument()" *ngIf="document.status === 'pending'">Approve</button>
    <button class="btn btn-danger" (click)="rejectDocument()" *ngIf="document.status === 'pending'">Reject</button>
    <button class="btn btn-warning" (click)="requestChanges()" *ngIf="document.status === 'pending'">Request Changes</button>
    <button class="btn btn-secondary" (click)="viewDocument()">Preview</button>
  </div>
</div>
